name: MacOS Build

on:
  workflow_call:
    inputs:
      workspace_file:
        description: The name of the workspace file.
        type: string
        required: true

env: {}

defaults:
  run:
    working-directory: cocoa

jobs:
  build-14:
    name: Build MacOS 14
    runs-on: macos-14
    strategy:
      matrix:
#        architecture:
#          - ppc
#          - ppc64
#          - i386
#          - x86_64
#          - arm
#          - arm64
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build SpinningWings
        run: xcodebuild -workspace ${{ inputs.workspace_file }} -scheme SpinningWings -configuration=${{ matrix.configuration }}
      - name: Test SpinningWings
        run: xcodebuild test -workspace ${{ inputs.workspace_file }} -scheme SpinningWings -configuration=${{ matrix.configuration }}
      - name: Build WingsSaver
        run: xcodebuild -workspace ${{ inputs.workspace_file }} -scheme WingsSaver -configuration=${{ matrix.configuration }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.configuration }}-14
          path: |
            /Users/runner/Library/Developer/Xcode/DerivedData/
  build-15:
