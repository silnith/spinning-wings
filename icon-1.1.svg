<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" viewBox="0,0 64,64" preserveAspectRatio="meet" style="fill: none;">
    <title>Spinning Wings icon</title>
    <desc>The application icon for Spinning Wings.</desc>
    <symbol id="wing">
        <desc>A single wing.</desc>
        <polygon points="0,12 23,0 46,12 23,24" stroke="white"/>
    </symbol>
    <g>
        <desc>Three wings of different colors and positions.</desc>
        <use xlink:href="#wing" x="8" y="19" transform="translate(-2, 13)" style="fill: red;"/>
        <use xlink:href="#wing" x="8" y="19" transform="translate(0, 0)" style="fill: blue;"/>
        <use xlink:href="#wing" x="8" y="19" transform="translate(2, -13)" style="fill: lime;"/>
    </g>
</svg>
